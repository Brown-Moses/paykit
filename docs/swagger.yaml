basePath: /
host: localhost:8080
info:
  contact: {}
  description: Production-ready multi-tenant payment notification engine for MTN MoMo.
  title: PayKit — Mobile Money Webhook Engine
  version: "1.0"
paths:
  /admin/dlq:
    get:
      description: Returns delivery DLQ entries (failed merchant webhook deliveries)
        for the authenticated merchant.
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              count:
                type: integer
              data:
                type: array
              limit:
                type: integer
              page:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List DLQ records
      tags:
      - Admin DLQ
  /admin/dlq/{id}/retry:
    post:
      description: Triggers immediate retry for a permanently failed merchant webhook
        delivery. On success it resolves the DLQ record.
      parameters:
      - description: DLQ id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Retry a DLQ item immediately
      tags:
      - Admin DLQ
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a merchant using their API key and returns current status
        and usage.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          properties:
            api_key:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              current_month_calls:
                type: integer
              id:
                type: integer
              max_monthly_calls:
                type: integer
              name:
                type: string
              plan_type:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Authenticate merchant
      tags:
      - Auth
  /health:
    get:
      description: Returns server and database status. Use this to verify the service
        is running before sending webhooks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              database:
                type: string
              status:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              database:
                type: string
              status:
                type: string
            type: object
      summary: Health check
      tags:
      - System
  /merchants/webhook-url:
    put:
      consumes:
      - application/json
      description: Updates the destination URL where PayKit forwards verified notifications.
      parameters:
      - description: Webhook URL details
        in: body
        name: request
        required: true
        schema:
          properties:
            webhook_url:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              webhook_url:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update merchant webhook URL
      tags:
      - Merchants
  /metrics:
    get:
      description: Returns transaction volume and delivery success rate.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              delivery_success_rate:
                type: string
              transactions_failed:
                type: integer
              transactions_successful:
                type: integer
              transactions_total:
                type: integer
              uptime:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: System metrics
      tags:
      - System
  /transactions:
    get:
      description: Returns paginated transactions for the authenticated merchant.
        Filter by status or look up a specific order using external_id.
      parameters:
      - description: Look up by order ID (e.g. order_987)
        in: query
        name: external_id
        type: string
      - description: 'Filter by status: SUCCESSFUL, FAILED, PENDING'
        in: query
        name: status
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              count:
                type: integer
              data:
                type: array
              limit:
                type: integer
              page:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List and filter transactions
      tags:
      - Transactions
  /transactions/{id}:
    get:
      description: Returns a single transaction scoped to the authenticated merchant.
        The paid field gives a simple true/false answer.
      parameters:
      - description: Provider transaction ID (e.g. TX-001)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              amount:
                type: string
              currency:
                type: string
              external_id:
                type: string
              paid:
                type: boolean
              provider_tx_id:
                type: string
              received_at:
                type: string
              status:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get transaction by provider ID
      tags:
      - Transactions
  /transactions/{id}/deliveries:
    get:
      description: Returns all webhook delivery attempts made to the merchant's webhook
        URL for a given transaction. Shows attempt number, status, HTTP response code,
        and any error messages.
      parameters:
      - description: Provider transaction ID (e.g. TX-001)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              attempts:
                type: integer
              logs:
                type: array
              transaction_id:
                type: string
              webhook_url:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get delivery attempts for a transaction
      tags:
      - Delivery Logs
securityDefinitions:
  BearerAuth:
    description: 'Enter your API key as: Bearer pk_live_xxx'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
