<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — PayKit</title>
  <link rel="stylesheet" href="/portal/paykit.css">
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card">
      <div class="card-header">
        <div class="brand">
          <div class="brand-dot"></div>
          PayKit Portal
        </div>
        <div class="page-header" style="display:block; margin-bottom:0;">
          <div class="page-title">Sign in</div>
          <div class="page-subtitle">Enter your API key to continue</div>
        </div>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <input type="text" id="api-key" class="mono" placeholder="pk_live_xxxxxxxxxxxxxxxx" required autocomplete="off" autofocus>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">
          Continue
        </button>

        <div id="error-message" class="inline-error">Invalid API key.</div>
      </form>

      <div class="page-subtitle" style="margin-top:16px; text-align:center;">
        Need a key? <a href="/portal/register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="/portal/api.js"></script>
  <script src="/portal/auth.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const apiKey = document.getElementById('api-key').value.trim();
      const errorDiv = document.getElementById('error-message');
      
      // Reset errors
      errorDiv.style.display = 'none';

      if (!apiKey) return;

      try {
        const btn = document.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Checking key...';

        await API.login(apiKey);
        setTimeout(() => {
          window.location.href = '/portal/dashboard.html';
        }, 200);
      } catch (err) {
        const btn = document.querySelector('button[type="submit"]');
        btn.disabled = false;
        btn.textContent = 'Continue';

        errorDiv.textContent = 'Invalid API key.';
        errorDiv.style.display = 'block';
      }
    }
  </script>
</body>
</html>
