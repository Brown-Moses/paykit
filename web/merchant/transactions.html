<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — PayKit</title>
  <link rel="stylesheet" href="/portal/paykit.css">
  <style>
    tbody tr { cursor: pointer; }
    .timeline { display:flex; flex-direction:column; gap:12px; position:relative; padding-left:16px; }
    .timeline::before { content:''; position:absolute; left:3px; top:4px; bottom:4px; width:1px; background: var(--border); }
    .timeline-item { position:relative; }
    .timeline-dot { position:absolute; left:-13px; top:4px; width:8px; height:8px; border-radius:999px; background: var(--text-secondary); }
    .timeline-dot.success { background: var(--success); }
    .timeline-dot.failed { background: var(--danger); }
    .timeline-content { background: rgba(255,255,255,0.02); border:0.5px solid var(--border); border-radius:8px; padding:10px 12px; }
    .filter-row { display:grid; grid-template-columns: 2fr 1fr auto; gap:12px; align-items:flex-end; }
    .pagination { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:12px; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Transactions</div>
          <div class="page-subtitle">Search and inspect payment activity</div>
        </div>
      </div>

      <div class="card">
        <form id="filter-form" onsubmit="handleFilter(event)" class="filter-row">
          <div class="form-group" style="margin-bottom:0;">
            <label for="search-query">Search</label>
            <input type="text" id="search-query" placeholder="Search by transaction ID or order ID">
          </div>

          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-status">Status</label>
            <select id="filter-status">
              <option value="">All</option>
              <option value="SUCCESSFUL">Successful</option>
              <option value="FAILED">Failed</option>
              <option value="PENDING">Pending</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary">Search</button>
        </form>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>External ID</th>
                <th>Amount</th>
                <th>Currency</th>
                <th>Status</th>
                <th>Received</th>
              </tr>
            </thead>
            <tbody id="transactions-tbody">
              <tr><td colspan="6" style="text-align:center; padding:24px;">Loading transactions…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination">
          <button class="btn" id="btn-prev" onclick="changePage(-1)" disabled>Previous</button>
          <span id="page-indicator" class="subtitle">Page 1</span>
          <button class="btn" id="btn-next" onclick="changePage(1)" disabled>Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sliding Details Drawer (Slides from right) -->
  <div class="drawer" id="inspect-drawer">
    <div class="drawer-header">
      <h3 class="card-title"><i class="ti ti-arrows-exchange"></i> Transaction details</h3>
      <button class="btn" onclick="closeDrawer()">×</button>
    </div>

    <div class="drawer-body">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div>
          <label>Status</label>
          <div style="margin-top:4px;"><span class="badge" id="drawer-status">-</span></div>
        </div>
        <div>
          <label>Received</label>
          <div id="drawer-received-at" style="margin-top:4px; color:var(--text-primary);">-</div>
        </div>
        <div style="grid-column:span 2;">
          <label>Provider ID</label>
          <div id="drawer-provider-tx-id" class="mono" style="margin-top:4px; color:var(--accent); word-break:break-all;">-</div>
        </div>
        <div style="grid-column:span 2;">
          <label>External ID</label>
          <div id="drawer-external-id" style="margin-top:4px; color:var(--text-primary); word-break:break-all;">-</div>
        </div>
        <div>
          <label>Amount</label>
          <div id="drawer-amount" style="margin-top:4px; color:var(--text-primary);">-</div>
        </div>
        <div>
          <label>Currency</label>
          <div id="drawer-currency" style="margin-top:4px; color:var(--text-primary);">-</div>
        </div>
      </div>

      <div id="drawer-dlq-action-container" style="display:none; border-top:0.5px solid var(--border); padding-top:12px;">
        <button class="btn btn-danger" id="btn-view-dlq" style="width:100%; justify-content:center;">
          <i class="ti ti-inbox"></i> View failures in DLQ
        </button>
      </div>

      <div style="border-top:0.5px solid var(--border); padding-top:12px;">
        <label>Webhook delivery history</label>
        <div id="drawer-timeline" class="timeline" style="margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <script src="/portal/api.js"></script>
  <script src="/portal/auth.js"></script>
  <script>
    let currentPage = 1;
    const limitPerPage = 15;
    let currentFilters = { status: '', query: '' };

    document.addEventListener('DOMContentLoaded', () => {
      Auth.injectNavigation('transactions');
      loadTransactions();
    });

    async function loadTransactions() {
      try {
        const query = currentFilters.query;
        let res;

        // Try direct lookup if it looks like an exact External ID / TX ID
        if (query) {
          try {
            // First check if it matches by externalId
            res = await API.getTransactions({
              page: currentPage,
              limit: limitPerPage,
              status: currentFilters.status,
              externalId: query
            });
          } catch (e) {
            // Fallback: try by transactionId directly (if the backend has /transactions/:id endpoint)
            try {
              const tx = await API.getTransaction(query);
              res = { data: [tx], page: 1, count: 1 };
            } catch (err) {
              // If both failed, list transactions with status filter normally (search query mismatch)
              res = { data: [], page: 1, count: 0 };
            }
          }
        } else {
          res = await API.getTransactions({
            page: currentPage,
            limit: limitPerPage,
            status: currentFilters.status
          });
        }

        renderTransactions(res.data);
        updatePagination(res.page, res.count);
      } catch (err) {
        Auth.showToast('Could not load transactions: ' + err.message, 'error');
      }
    }

    function renderTransactions(txs) {
      const tbody = document.getElementById('transactions-tbody');
      tbody.innerHTML = '';

      if (!txs || txs.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center; padding:24px;">
              <div class="empty-state" style="padding:0;">
                <div class="empty-state-icon"><i class="ti ti-arrows-exchange"></i></div>
                <p>No transactions found. If you search for an order, make sure the ID matches exactly.</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      const list = Array.isArray(txs) ? txs : [txs];

      list.forEach(tx => {
        const tr = document.createElement('tr');
        const badgeClass = tx.status === 'SUCCESSFUL' ? 'badge-success' : (tx.status === 'FAILED' ? 'badge-danger' : 'badge-warning');
        
        tr.innerHTML = `
          <td class="mono" style="color: var(--accent);">${tx.provider_tx_id}</td>
          <td>${tx.external_id}</td>
          <td>${parseFloat(tx.amount).toLocaleString()}</td>
          <td>${tx.currency}</td>
          <td><span class="badge ${badgeClass}">${tx.status}</span></td>
          <td>${new Date(tx.received_at).toLocaleString()}</td>
        `;
        
        // Handle row click
        tr.addEventListener('click', () => inspectTransaction(tx));
        tbody.appendChild(tr);
      });
    }

    function updatePagination(page, count) {
      currentPage = page;
      document.getElementById('page-indicator').textContent = `Page ${page}`;
      document.getElementById('btn-prev').disabled = page <= 1;
      document.getElementById('btn-next').disabled = count < limitPerPage;
    }

    function changePage(direction) {
      currentPage += direction;
      loadTransactions();
    }

    function handleFilter(e) {
      e.preventDefault();
      currentPage = 1;
      currentFilters.query = document.getElementById('search-query').value.trim();
      currentFilters.status = document.getElementById('filter-status').value;
      loadTransactions();
    }

    async function inspectTransaction(tx) {
      // Set details fields immediately
      document.getElementById('drawer-provider-tx-id').textContent = tx.provider_tx_id;
      document.getElementById('drawer-external-id').textContent = tx.external_id || 'None';
      document.getElementById('drawer-amount').textContent = parseFloat(tx.amount).toLocaleString();
      document.getElementById('drawer-currency').textContent = tx.currency;
      document.getElementById('drawer-received-at').textContent = new Date(tx.received_at).toLocaleString();

      const statusBadge = document.getElementById('drawer-status');
      statusBadge.textContent = tx.status;
      statusBadge.className = 'badge ' + (tx.status === 'SUCCESSFUL' ? 'badge-success' : (tx.status === 'FAILED' ? 'badge-danger' : 'badge-warning'));

      // If failed, show DLQ view shortcut
      const dlqAction = document.getElementById('drawer-dlq-action-container');
      if (tx.status === 'FAILED') {
        dlqAction.style.display = 'block';
        document.getElementById('btn-view-dlq').onclick = () => {
          window.location.href = `/portal/dlq.html?search=${tx.provider_tx_id}`;
        };
      } else {
        dlqAction.style.display = 'none';
      }

      // Load delivery log timeline
      const timeline = document.getElementById('drawer-timeline');
      timeline.innerHTML = '<div style="color: var(--text-muted); font-size: 0.85rem;">Loading delivery logs...</div>';
      
      // Open Drawer
      document.getElementById('inspect-drawer').classList.add('active');

      try {
        const res = await API.getDeliveryLogs(tx.provider_tx_id);
        timeline.innerHTML = '';

        if (!res.logs || res.logs.length === 0) {
          timeline.innerHTML = `
            <div style="color: var(--text-muted); font-size: 0.85rem; padding: 0.5rem 0;">
              No webhook attempts recorded for this event.
            </div>`;
          return;
        }

        res.logs.forEach(log => {
          const item = document.createElement('div');
          item.className = 'timeline-item';
          
          const isSuccess = log.Status === 'SUCCESS';
          const dotClass = isSuccess ? 'success' : 'failed';
          
          item.innerHTML = `
            <div class="timeline-dot ${dotClass}"></div>
            <div class="timeline-content">
              <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:4px;">
                <span>Attempt #${log.Attempt}</span>
                <span class="badge ${isSuccess ? 'badge-success' : 'badge-danger'}">
                  HTTP ${log.ResponseCode || 'N/A'}
                </span>
              </div>
              ${log.ErrorMessage ? `<p class="mono" style="font-size:11px; color: var(--danger); margin-bottom:4px; word-break:break-all;">Error: ${log.ErrorMessage}</p>` : ''}
              <div style="font-size:11px; color: var(--text-tertiary); text-align:right;">
                ${new Date(log.DeliveredAt).toLocaleTimeString()}
              </div>
            </div>
          `;
          timeline.appendChild(item);
        });

      } catch (err) {
        timeline.innerHTML = `<div style="color: var(--accent-rose); font-size: 0.85rem;">Error loading delivery logs: ${err.message}</div>`;
      }
    }

    function closeDrawer() {
      document.getElementById('inspect-drawer').classList.remove('active');
    }
  </script>
</body>
</html>
