<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — PayKit Portal</title>
  <link rel="stylesheet" href="/portal/paykit.css">
  <style>
    /* Custom transaction row hover cursor */
    tbody tr {
      cursor: pointer;
    }
    /* Timeline styles for drawer */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      position: relative;
      padding-left: 1.5rem;
      margin-top: 1rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background-color: var(--border-color);
    }
    .timeline-item {
      position: relative;
    }
    .timeline-dot {
      position: absolute;
      left: -23px;
      top: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--text-muted);
      border: 2px solid var(--bg-card-solid);
    }
    .timeline-dot.success {
      background-color: var(--accent-emerald);
      box-shadow: 0 0 8px var(--accent-emerald);
    }
    .timeline-dot.failed {
      background-color: var(--accent-rose);
      box-shadow: 0 0 8px var(--accent-rose);
    }
    .timeline-content {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div>
        <h1>Transactions Log</h1>
        <p class="subtitle">Search, filter, and drill into customer payments</p>
      </div>

      <!-- Filters & Search Panel -->
      <div class="card" style="padding: 1.5rem;">
        <form id="filter-form" onsubmit="handleFilter(event)" style="display: grid; grid-template-columns: 2fr 1fr auto; gap: 1.25rem; align-items: flex-end;">
          <div class="form-group" style="margin-bottom: 0;">
            <label for="search-query">Search Transaction</label>
            <input type="text" id="search-query" placeholder="Enter Transaction ID or External ID...">
          </div>

          <div class="form-group" style="margin-bottom: 0;">
            <label for="filter-status">Filter Status</label>
            <select id="filter-status">
              <option value="">All Transactions</option>
              <option value="SUCCESSFUL">Successful</option>
              <option value="FAILED">Failed</option>
              <option value="PENDING">Pending</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" style="height: 48px; min-width: 140px;">
            Search 🔍
          </button>
        </form>
      </div>

      <!-- Transactions Logs Table -->
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Provider TX ID</th>
                <th>External ID</th>
                <th>Amount</th>
                <th>Currency</th>
                <th>Status</th>
                <th>Received At</th>
              </tr>
            </thead>
            <tbody id="transactions-tbody">
              <tr>
                <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 3rem;">Loading transactions...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination Controls -->
        <div class="pagination">
          <button class="btn btn-secondary" id="btn-prev" onclick="changePage(-1)" disabled>&larr; Previous</button>
          <span style="color: var(--text-muted); font-size: 0.9rem;" id="page-indicator">Page 1</span>
          <button class="btn btn-secondary" id="btn-next" onclick="changePage(1)" disabled>Next &rarr;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sliding Details Drawer (Slides from right) -->
  <div class="drawer" id="inspect-drawer">
    <div class="drawer-header">
      <h3 class="card-title">🔍 Transaction Details</h3>
      <button class="btn btn-secondary" onclick="closeDrawer()" style="padding: 0.4rem 0.6rem;">✕</button>
    </div>

    <div class="drawer-body">
      <!-- Info Fields -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
        <div>
          <label style="font-size: 0.75rem;">Status</label>
          <div style="margin-top: 0.25rem;"><span class="badge" id="drawer-status">-</span></div>
        </div>
        <div>
          <label style="font-size: 0.75rem;">Received At</label>
          <div id="drawer-received-at" style="font-weight: 600; margin-top: 0.25rem; font-size: 0.9rem;">-</div>
        </div>
        <div style="grid-column: span 2;">
          <label style="font-size: 0.75rem;">Provider TX ID</label>
          <div id="drawer-provider-tx-id" style="font-family: 'Fira Code', monospace; color: var(--accent-cyan); font-weight: 500; margin-top: 0.25rem; font-size: 1rem; word-break: break-all;">-</div>
        </div>
        <div style="grid-column: span 2;">
          <label style="font-size: 0.75rem;">External ID</label>
          <div id="drawer-external-id" style="font-weight: 600; margin-top: 0.25rem; font-size: 0.95rem; word-break: break-all;">-</div>
        </div>
        <div>
          <label style="font-size: 0.75rem;">Amount</label>
          <div id="drawer-amount" style="font-size: 1.15rem; font-weight: 700; margin-top: 0.25rem; color: var(--text-main);">-</div>
        </div>
        <div>
          <label style="font-size: 0.75rem;">Currency</label>
          <div id="drawer-currency" style="font-size: 1.15rem; font-weight: 700; margin-top: 0.25rem; color: var(--text-main);">-</div>
        </div>
      </div>

      <!-- Action Button if Failed -->
      <div id="drawer-dlq-action-container" style="display: none; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <button class="btn btn-danger" id="btn-view-dlq" style="width: 100%; justify-content: center; gap: 0.5rem;">
          📥 View Failures in DLQ
        </button>
      </div>

      <!-- Delivery Logs Timeline -->
      <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <label>Webhook Delivery History</label>
        <div id="drawer-timeline" class="timeline">
          <!-- Timeline elements injected here -->
        </div>
      </div>
    </div>
  </div>

  <script src="/portal/api.js"></script>
  <script src="/portal/auth.js"></script>
  <script>
    let currentPage = 1;
    const limitPerPage = 15;
    let currentFilters = { status: '', query: '' };

    document.addEventListener('DOMContentLoaded', () => {
      Auth.injectNavigation('transactions');
      loadTransactions();
    });

    async function loadTransactions() {
      try {
        const query = currentFilters.query;
        let res;

        // Try direct lookup if it looks like an exact External ID / TX ID
        if (query) {
          try {
            // First check if it matches by externalId
            res = await API.getTransactions({
              page: currentPage,
              limit: limitPerPage,
              status: currentFilters.status,
              externalId: query
            });
          } catch (e) {
            // Fallback: try by transactionId directly (if the backend has /transactions/:id endpoint)
            try {
              const tx = await API.getTransaction(query);
              res = { data: [tx], page: 1, count: 1 };
            } catch (err) {
              // If both failed, list transactions with status filter normally (search query mismatch)
              res = { data: [], page: 1, count: 0 };
            }
          }
        } else {
          res = await API.getTransactions({
            page: currentPage,
            limit: limitPerPage,
            status: currentFilters.status
          });
        }

        renderTransactions(res.data);
        updatePagination(res.page, res.count);
      } catch (err) {
        Auth.showToast('Could not load transactions: ' + err.message, 'error');
      }
    }

    function renderTransactions(txs) {
      const tbody = document.getElementById('transactions-tbody');
      tbody.innerHTML = '';

      if (!txs || txs.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 3rem;">
              <div class="empty-state" style="padding: 0;">
                <div class="empty-state-icon">💸</div>
                <p style="font-weight: 500;">No transactions found. If you search for an order, make sure the ID matches exactly.</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      const list = Array.isArray(txs) ? txs : [txs];

      list.forEach(tx => {
        const tr = document.createElement('tr');
        const badgeClass = tx.status === 'SUCCESSFUL' ? 'badge-success' : (tx.status === 'FAILED' ? 'badge-danger' : 'badge-warning');
        
        tr.innerHTML = `
          <td style="font-family: 'Fira Code', monospace; color: var(--accent-cyan); font-weight: 500;">${tx.provider_tx_id}</td>
          <td>${tx.external_id}</td>
          <td>${parseFloat(tx.amount).toLocaleString()}</td>
          <td style="font-weight: 600;">${tx.currency}</td>
          <td><span class="badge ${badgeClass}">${tx.status}</span></td>
          <td style="color: var(--text-muted); font-size: 0.85rem;">${new Date(tx.received_at).toLocaleString()}</td>
        `;
        
        // Handle row click
        tr.addEventListener('click', () => inspectTransaction(tx));
        tbody.appendChild(tr);
      });
    }

    function updatePagination(page, count) {
      currentPage = page;
      document.getElementById('page-indicator').textContent = `Page ${page}`;
      document.getElementById('btn-prev').disabled = page <= 1;
      document.getElementById('btn-next').disabled = count < limitPerPage;
    }

    function changePage(direction) {
      currentPage += direction;
      loadTransactions();
    }

    function handleFilter(e) {
      e.preventDefault();
      currentPage = 1;
      currentFilters.query = document.getElementById('search-query').value.trim();
      currentFilters.status = document.getElementById('filter-status').value;
      loadTransactions();
    }

    async function inspectTransaction(tx) {
      // Set details fields immediately
      document.getElementById('drawer-provider-tx-id').textContent = tx.provider_tx_id;
      document.getElementById('drawer-external-id').textContent = tx.external_id || 'None';
      document.getElementById('drawer-amount').textContent = parseFloat(tx.amount).toLocaleString();
      document.getElementById('drawer-currency').textContent = tx.currency;
      document.getElementById('drawer-received-at').textContent = new Date(tx.received_at).toLocaleString();

      const statusBadge = document.getElementById('drawer-status');
      statusBadge.textContent = tx.status;
      statusBadge.className = 'badge ' + (tx.status === 'SUCCESSFUL' ? 'badge-success' : (tx.status === 'FAILED' ? 'badge-danger' : 'badge-warning'));

      // If failed, show DLQ view shortcut
      const dlqAction = document.getElementById('drawer-dlq-action-container');
      if (tx.status === 'FAILED') {
        dlqAction.style.display = 'block';
        document.getElementById('btn-view-dlq').onclick = () => {
          window.location.href = `/portal/dlq.html?search=${tx.provider_tx_id}`;
        };
      } else {
        dlqAction.style.display = 'none';
      }

      // Load delivery log timeline
      const timeline = document.getElementById('drawer-timeline');
      timeline.innerHTML = '<div style="color: var(--text-muted); font-size: 0.85rem;">Loading delivery logs...</div>';
      
      // Open Drawer
      document.getElementById('inspect-drawer').classList.add('active');

      try {
        const res = await API.getDeliveryLogs(tx.provider_tx_id);
        timeline.innerHTML = '';

        if (!res.logs || res.logs.length === 0) {
          timeline.innerHTML = `
            <div style="color: var(--text-muted); font-size: 0.85rem; padding: 0.5rem 0;">
              No webhook attempts recorded for this event.
            </div>`;
          return;
        }

        res.logs.forEach(log => {
          const item = document.createElement('div');
          item.className = 'timeline-item';
          
          const isSuccess = log.Status === 'SUCCESS';
          const dotClass = isSuccess ? 'success' : 'failed';
          
          item.innerHTML = `
            <div class="timeline-dot ${dotClass}"></div>
            <div class="timeline-content">
              <div class="flex-between" style="font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem;">
                <span>Attempt #${log.Attempt}</span>
                <span class="badge ${isSuccess ? 'badge-success' : 'badge-danger'}" style="font-size: 0.65rem; padding: 0.15rem 0.4rem;">
                  HTTP ${log.ResponseCode || 'N/A'}
                </span>
              </div>
              ${log.ErrorMessage ? `<p style="font-family: 'Fira Code', monospace; font-size: 0.75rem; color: var(--accent-rose); margin-bottom: 0.25rem; word-break: break-all;">Error: ${log.ErrorMessage}</p>` : ''}
              <div style="font-size: 0.75rem; color: var(--text-muted); text-align: right;">
                ${new Date(log.DeliveredAt).toLocaleTimeString()}
              </div>
            </div>
          `;
          timeline.appendChild(item);
        });

      } catch (err) {
        timeline.innerHTML = `<div style="color: var(--accent-rose); font-size: 0.85rem;">Error loading delivery logs: ${err.message}</div>`;
      }
    }

    function closeDrawer() {
      document.getElementById('inspect-drawer').classList.remove('active');
    }
  </script>
</body>
</html>
