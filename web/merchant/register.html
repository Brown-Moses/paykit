<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PayKit</title>
  <link rel="stylesheet" href="/portal/paykit.css">
  <style>
    .register-body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .register-card { width:480px; max-width:100%; }
    .vault-overlay { position:fixed; inset:0; background:rgba(2,6,23,0.9); display:none; align-items:center; justify-content:center; z-index:10000; padding:24px; }
    .vault-overlay.active { display:flex; }
    .vault-modal { width:min(620px,100%); background:var(--bg-surface); border:0.5px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 20px 50px rgba(0,0,0,0.35); }
    .vault-key-container { background:rgba(255,255,255,0.03); border:0.5px solid var(--border); border-radius:10px; padding:12px; margin:16px 0; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .vault-key { font-family:var(--font-mono); font-size:0.95rem; color:var(--accent); word-break:break-all; }
    .warning-box { background:rgba(245,158,11,0.08); border:0.5px solid rgba(245,158,11,0.25); border-radius:10px; padding:12px; margin:16px 0; }
    .checkbox-container { display:flex; align-items:center; gap:8px; margin:16px 0 20px; color:var(--text-secondary); }
    .checkbox-container input { accent-color: var(--accent); }
  </style>
</head>
<body class="register-body">

  <div class="card register-card" id="register-container">
    <div class="card-header" style="justify-content:center; flex-direction:column; gap:6px; margin-bottom:20px; text-align:center;">
      <div class="brand" style="margin-bottom:0;">
        <div class="brand-dot"></div>
        PayKit
      </div>
      <div class="page-subtitle">Create your developer account</div>
    </div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" placeholder="e.g. John Doe" required>
      </div>

      <div class="form-group">
        <label for="businessName">Business / company</label>
        <input type="text" id="businessName" placeholder="e.g. Kigali Deliveries Ltd" required>
      </div>

      <div class="form-group">
        <label for="webhookUrl">Webhook URL</label>
        <input type="text" id="webhookUrl" placeholder="https://api.yourdomain.com/webhooks/momo">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:16px;">Generate API key</button>
    </form>

    <div style="margin-top:16px; text-align:center; color:var(--text-secondary);">
      Already have a key? <a href="/portal/index.html" style="color:var(--accent); font-weight:600;">Sign in</a>
    </div>
  </div>

  <div class="vault-overlay" id="vault-modal-overlay">
    <div class="vault-modal">
      <div class="empty-state" style="padding:0;">
        <div class="empty-state-icon"><i class="ti ti-key"></i></div>
        <div class="page-title">Your API key is ready</div>
        <div class="page-subtitle">Keep it somewhere safe; it will only be shown once.</div>
      </div>

      <div class="vault-key-container">
        <span class="vault-key" id="key-display">pk_live_xxxxxxxxxxxxxxxxxxxxxxxx</span>
        <button class="btn" onclick="copyAPIKey()">Copy</button>
      </div>

      <div class="warning-box">
        <strong>Security note</strong>
        <p style="margin-top:6px;">If this key is lost, your integrations will stop working until you generate a new one.</p>
      </div>

      <label class="checkbox-container">
        <input type="checkbox" id="key-confirm" onchange="toggleContinueBtn()">
        <span>I have copied and stored my API key securely</span>
      </label>

      <button class="btn btn-primary" id="continue-btn" onclick="enterDashboard()" style="width:100%;" disabled>Continue to dashboard</button>
    </div>
  </div>

  <script src="/portal/api.js"></script>
  <script src="/portal/auth.js"></script>
  <script>
    let generatedKey = '';
    let merchantName = '';

    async function handleRegister(e) {
      e.preventDefault();
      const businessName = document.getElementById('businessName').value.trim();
      const webhookUrl = document.getElementById('webhookUrl').value.trim();

      try {
        const btn = document.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Generating Secure Key... 🔒';

        const res = await API.register(businessName, webhookUrl);
        generatedKey = res.api_key;
        merchantName = res.name;
        
        document.getElementById('key-display').textContent = generatedKey;
        
        // Show Vault Key Reveal Modal
        document.getElementById('vault-modal-overlay').classList.add('active');
        Auth.showToast('Secure Vault Key Generated!');
      } catch (err) {
        Auth.showToast(err.message || 'Could not generate account key', 'error');
        const btn = document.querySelector('button[type="submit"]');
        btn.disabled = false;
        btn.textContent = 'Generate Vault Key 🔑';
      }
    }

    function copyAPIKey() {
      navigator.clipboard.writeText(generatedKey);
      Auth.showToast('API Key copied to clipboard!');
    }

    function toggleContinueBtn() {
      const checkbox = document.getElementById('key-confirm');
      const btn = document.getElementById('continue-btn');
      btn.disabled = !checkbox.checked;
    }

    function enterDashboard() {
      // Direct sign in
      localStorage.setItem('paykit_api_key', generatedKey);
      localStorage.setItem('paykit_merchant_name', merchantName);
      localStorage.setItem('paykit_merchant_plan', 'free');
      
      Auth.showToast('Access Granted. Entering Portal...');
      setTimeout(() => {
        window.location.href = '/portal/dashboard.html';
      }, 800);
    }
  </script>
</body>
</html>
