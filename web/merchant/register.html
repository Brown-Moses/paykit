<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PayKit Portal</title>
  <link rel="stylesheet" href="/portal/paykit.css">
</head>
<body class="login-container">

  <div class="card login-card" id="register-card">
    <div class="card-header" style="justify-content: center; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem;">
      <div class="brand" style="margin-bottom: 0;">
        <div class="brand-dot"></div>
        PayKit Engine
      </div>
      <p class="subtitle">Create Your Merchant Account</p>
    </div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="name">Company / Merchant Name</label>
        <input type="text" id="name" placeholder="e.g. Kigali Deliveries Ltd" required>
      </div>

      <div class="form-group">
        <label for="webhook-url">Webhook URL (Optional)</label>
        <input type="text" id="webhook-url" placeholder="https://api.yourdomain.com/webhooks/momo">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        Register Merchant 🚀
      </button>
    </form>

    <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
      Already have an account? <a href="/portal/index.html" style="color: var(--accent-cyan); text-decoration: none; font-weight: 600;">Sign In Here &rarr;</a>
    </div>
  </div>

  <!-- Success Key Display -->
  <div class="card login-card" id="success-card" style="display: none;">
    <div class="card-header" style="justify-content: center; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; text-align: center;">
      <div style="font-size: 3rem;">🎉</div>
      <h2 style="font-weight: 700;">Account Created!</h2>
      <p class="subtitle">Here is your live API key. Save it now, it will not be shown again.</p>
    </div>

    <div class="form-group">
      <label>Your Live API Key</label>
      <div class="code-box">
        <span class="code-text" id="key-display">pk_live_xxxx</span>
        <button class="btn btn-secondary" onclick="copyAPIKey()" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">
          📋 Copy
        </button>
      </div>
    </div>

    <button class="btn btn-primary" onclick="redirectToLogin()" style="width: 100%; margin-top: 1.5rem;">
      Proceed to Log In ⚡
    </button>
  </div>

  <script src="/portal/api.js"></script>
  <script src="/portal/auth.js"></script>
  <script>
    let generatedKey = '';

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const webhookUrl = document.getElementById('webhook-url').value.trim();

      try {
        const btn = document.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Registering...';

        const res = await API.register(name, webhookUrl);
        generatedKey = res.api_key;
        
        document.getElementById('key-display').textContent = generatedKey;
        document.getElementById('register-card').style.display = 'none';
        document.getElementById('success-card').style.display = 'block';
        Auth.showToast('Registration successful!');
      } catch (err) {
        Auth.showToast(err.message || 'Could not complete registration', 'error');
        const btn = document.querySelector('button[type="submit"]');
        btn.disabled = false;
        btn.textContent = 'Register Merchant 🚀';
      }
    }

    function copyAPIKey() {
      navigator.clipboard.writeText(generatedKey);
      Auth.showToast('API Key copied to clipboard!');
    }

    function redirectToLogin() {
      window.location.href = '/portal/index.html';
    }
  </script>
</body>
</html>
